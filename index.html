<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>内部 AI 设计台</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="top-nav">
      <div class="brand-lockup">
        <button class="tool-select" type="button" id="toolMenuBtn"><span class="ts-dot"></span><span>AI图片工具</span><i class="ts-caret"></i></button>
      </div>
      <div class="tool-mega" id="toolMega" aria-hidden="true">
        <div class="tool-mega-inner">
          <h2>AI电商工具</h2>
          <div class="tool-grid">
            <button class="tool-card hot active" type="button">
              <span class="tool-thumb people"></span>
              <strong>AI设计师</strong>
              <em>一句话生图，零门槛</em>
            </button>
            <button class="tool-card" type="button">
              <span class="tool-thumb bg"></span>
              <strong>AI万物抠图</strong>
              <em>一键去除图片背景</em>
            </button>
            <button class="tool-card" type="button">
              <span class="tool-thumb refine"></span>
              <strong>AI产品精修</strong>
              <em>精修重绘，轻松摆脱PS</em>
            </button>
            <button class="tool-card" type="button">
              <span class="tool-thumb goods"></span>
              <strong>AI商品图</strong>
              <em>智能背景，轻松制作电商商品图</em>
            </button>
            <button class="tool-card" type="button">
              <span class="tool-thumb white"></span>
              <strong>AI白底图</strong>
              <em>全平台尺寸批量换白底</em>
            </button>
            <button class="tool-card" type="button">
              <span class="tool-thumb portrait"></span>
              <strong>AI人像换背景</strong>
              <em>随心更换背景，逼真人像融合</em>
            </button>
            <button class="tool-card" type="button">
              <span class="tool-thumb clear"></span>
              <strong>AI通用变清晰</strong>
              <em>修复各种模糊商品图</em>
            </button>
            <button class="tool-card" type="button">
              <span class="tool-thumb translate"></span>
              <strong>AI图片翻译</strong>
              <em>商品图翻译，跨境必备</em>
            </button>
            <button class="tool-card" type="button">
              <span class="tool-thumb color"></span>
              <strong>AI商品换色</strong>
              <em>智能改色，一键更换所有配色</em>
            </button>
            <button class="tool-card new" type="button">
              <span class="tool-thumb suite"></span>
              <strong>电商套图</strong>
              <em>无需PS，一键搞定专业商品图</em>
            </button>
          </div>
          <button class="all-tools" type="button">所有工具 ›</button>
        </div>
      </div>
      <div class="nav-actions">
        <button type="button">🎧 联系作者</button>
        <button type="button" id="openSettings">⚙ 模型与密钥</button>
        <a class="login-btn" href="https://github.com/jeni0101/ai-image" target="_blank" rel="noopener">GitHub</a>
      </div>
    </header>

    <aside class="side-panel">
      <button class="new-session" type="button">＋ 开启新对话</button>
      <span class="history-title">历史对话</span>
      <nav class="history-list" id="historyList"></nav>
      <div class="side-note">
        <p>图片由AI生成，仅供参考</p>
        <p>※ AI对话只保存30天，请及时下载</p>
      </div>
    </aside>

    <main class="page-main">
      <button class="collapse-btn" type="button">▣</button>
      <section class="hero-workspace">
        <h1><span>✦</span> 内部AI设计台，快速生成电商素材 <span>✦</span></h1>

        <section class="prompt-box">
          <div class="mode-rail">
            <button class="active" type="button" data-mode="image" title="图片生成" aria-label="图片生成">
              <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="16" rx="2.5"/><circle cx="8.5" cy="9.5" r="1.6"/><path d="M5 18l4.5-5 3 3.2L16 12l3 4"/></svg>
            </button>
            <button type="button" data-mode="video" title="视频生成" aria-label="视频生成">
              <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="13" height="14" rx="2.5"/><path d="M16 10l5-3v10l-5-3z"/></svg>
            </button>
          </div>
          <div class="prompt-main">
            <div class="prompt-top">
              <label class="add-image" for="imageInput" title="上传/拖入/粘贴参考图">
                <input id="imageInput" type="file" accept="image/png,image/jpeg,image/webp" multiple>
                ＋
              </label>
              <input id="promptInput" value="将图一中的商品更换为图二商品，保留原图构图与光影" aria-label="提示词">
            </div>
            <div class="ref-strip" id="refStrip" hidden></div>
            <div class="prompt-bottom">
              <div class="pill-row">
                <div class="dd" id="providerDD" title="服务商"></div>
                <div class="dd" id="ratioDD" title="比例"></div>
                <div class="dd" id="qualityDD" title="质量"></div>
                <div class="count-step" id="countStep" title="生成数量">
                  <button type="button" data-d="-1">−</button><span id="countVal">2</span><button type="button" data-d="1">＋</button>
                </div>
                <button class="round-pill" type="button" id="settingsBtn" title="套图 / 高级设置">
                  <svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><line x1="4" y1="8" x2="20" y2="8"/><line x1="4" y1="16" x2="20" y2="16"/><circle cx="10" cy="8" r="2.4" fill="#fff"/><circle cx="15" cy="16" r="2.4" fill="#fff"/></svg>
                </button>
              </div>
              <div class="send-zone">
                <span id="keyState"></span>
                <button class="send-btn" type="button" id="sendBtn" title="生成 (Enter)">
                  <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20V6"/><path d="M6 12l6-6 6 6"/></svg>
                </button>
              </div>
            </div>
          </div>
        </section>

        <div class="shortcut-row">
          <button type="button" data-template="model">♙ 生成模特图</button>
          <button type="button" data-template="replace">▣ 商品替换</button>
          <button type="button" data-template="suite">▦ 电商套图</button>
          <button type="button" data-template="amazon">▦ 亚马逊A+</button>
          <button type="button" data-template="bg">▩ 产品换背景</button>
        </div>
      </section>

      <section class="content-section result-section" id="resultSection" hidden>
        <h2>生成结果 <small id="resultMeta"></small></h2>
        <div class="result-strip" id="resultStrip"></div>
      </section>

      <section class="content-section quick-start">
        <h2>快速开始</h2>
        <div class="template-strip" id="quickGrid"></div>
      </section>

      <section class="content-section inspiration">
        <h2>灵感库</h2>
        <div class="tab-row" id="categoryTabs"></div>
        <div class="gallery-grid" id="templateGrid"></div>
      </section>
    </main>

    <button class="float-widget" type="button">🌐</button>

    <div class="modal-mask" id="functionPopup" aria-hidden="true">
      <section class="template-modal" id="modalCard">
        <button class="modal-close" type="button" id="closePopup">×</button>
        <div class="modal-left">
          <header class="modal-head">
            <h2 id="modalTitle">电商套图</h2>
            <nav>
              <button class="active" type="button">使用指南</button>
              <button type="button">使用说明</button>
              <button type="button">如何批量</button>
            </nav>
            <a href="#" id="surveyLink">🎁 参与内测&提建议</a>
          </header>
          <p class="modal-desc" id="modalDesc">一键制作同款电商套图，上传您的商品图片，智能生成主图、场景图及细节特写。</p>

          <label class="modal-upload" for="modalImageInput">
            <input id="modalImageInput" type="file" accept="image/png,image/jpeg,image/webp" multiple>
            <strong>上传商品图</strong>
            <span>同一产品，最多5张</span>
            <small>或拖入、粘贴图片和URL<br>需要批量套图?</small>
          </label>

          <section class="modal-block">
            <div class="block-title">
              <h3 id="modalFieldTitle">商品卖点</h3>
              <button type="button" id="aiWriteBtn">✦ AI帮写</button>
            </div>
            <textarea id="modalTextarea" rows="4" placeholder="建议包含以下信息生成更精准：1.产品名称 2.核心卖点 3.适用人群 4.期望场景 5.具体参数"></textarea>
          </section>

          <section class="modal-block">
            <div class="settings-head">
              <h3>生成设置</h3>
              <span id="settingHint">销售站点、区域</span>
              <button type="button">☷ 更多设置</button>
            </div>
            <div class="select-row" id="modalSelects"></div>
          </section>

          <section class="modal-block option-block">
            <div class="settings-head">
              <h3 id="optionTitle">套图选择</h3>
              <span>✎ 设计图片内容</span>
              <small id="selectedCount">已选7张</small>
              <button type="button">查看全部选项 ›</button>
            </div>
            <div class="option-pills" id="modalOptions"></div>
          </section>

          <div class="modal-action-area">
            <button class="copyright-link" type="button">使用旧版提示词</button>
            <button class="modal-generate" type="button" id="modalCreateBtn">↖ 开始生成 ◎ 84</button>
            <label class="stable-switch">稳定模式 ⓘ <input type="checkbox"><span></span></label>
          </div>
        </div>
        <div class="modal-right" id="modalRight">
          <div class="empty-figure">♡</div>
          <p id="rightHint">上传商品，轻松做出专业电商设计</p>
        </div>
      </section>
    </div>

    <div class="modal-mask" id="settingsMask" aria-hidden="true">
      <section class="settings-modal">
        <button class="modal-close" type="button" id="closeSettings">×</button>
        <h2>模型与密钥</h2>
        <p class="settings-tip">密钥保存在本机（接入桌面端后将转入系统钥匙串），不上传服务器。</p>
        <div class="settings-row">
          <label>默认服务商</label>
          <div class="dd" id="defaultProviderDD"></div>
        </div>
        <div class="settings-keys" id="settingsKeys"></div>
        <button class="modal-generate" type="button" id="saveSettings">保存</button>
      </section>
    </div>

    <script type="module" src="app.js"></script>
  </body>
</html>
